<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="none"/>

  <!-- Round badge — woven patch reference -->
  <!-- Outer ring -->
  <circle cx="400" cy="400" r="320" stroke="#2C2C2E" stroke-width="8"/>
  <circle cx="400" cy="400" r="290" stroke="#2C2C2E" stroke-width="4"/>

  <!-- POSTED — center -->
  <text x="400" y="380" text-anchor="middle"
        font-family="Bebas Neue, Arial, Helvetica, sans-serif"
        font-size="120" font-weight="400" letter-spacing="8" fill="#2C2C2E">
    POSTED
  </text>

  <!-- Coral Reef divider -->
  <line x1="220" y1="420" x2="360" y2="420" stroke="#C4705A" stroke-width="4"/>
  <line x1="440" y1="420" x2="580" y2="420" stroke="#C4705A" stroke-width="4"/>

  <!-- HONOLULU -->
  <text x="400" y="500" text-anchor="middle"
        font-family="DIN Condensed, Arial, Helvetica, sans-serif"
        font-size="60" font-weight="700" letter-spacing="10" fill="#2C2C2E">
    HONOLULU
  </text>
</svg>
