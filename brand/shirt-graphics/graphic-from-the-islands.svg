        font-family="DIN Condensed, Arial, Helvetica, sans-serif"
        font-size="80" font-weight="700" letter-spacing="14" fill="#2B6B7F">
    FROM THE ISLANDS
  </text>

  <!-- Coral Reef divider -->
  <line x1="400" y1="340" x2="1200" y2="340" stroke="#C4705A" stroke-width="4"/>

