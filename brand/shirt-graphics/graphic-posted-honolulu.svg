<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1200" fill="none"/>

  <!-- POSTED — large -->
  <text x="800" y="420" text-anchor="middle"
        font-family="Bebas Neue, Arial, Helvetica, sans-serif"
        font-size="280" font-weight="400" letter-spacing="16" fill="#2C2C2E">
    POSTED
  </text>

  <!-- Coral Reef divider -->
  <line x1="400" y1="500" x2="1200" y2="500" stroke="#C4705A" stroke-width="4"/>

  <!-- HONOLULU -->
